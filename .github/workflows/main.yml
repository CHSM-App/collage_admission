name: Publish frontend and backend on tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FRONTEND_DIR: FrontEnd
  BACKEND_DIR: BackEnd
  DEPLOY_BRANCH: dist
  BACKEND_BRANCH: backend

jobs:
  build-and-publish:
    name: Build and publish frontend and backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.FRONTEND_DIR }}

      - name: Build project
        run: npm run build
        env:
          VITE_API_URL: https://collageserver.vengurlatech.com/
        working-directory: ${{ env.FRONTEND_DIR }}

      - name: Push frontend dist to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: ${{ env.DEPLOY_BRANCH }}
          publish_dir: ./${{ env.FRONTEND_DIR }}/dist
          force_orphan: true
          commit_message: Build from ${{ github.sha }}

      - name: Push backend to backend branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: ${{ env.BACKEND_BRANCH }}
          publish_dir: ./${{ env.BACKEND_DIR }}
          force_orphan: true
          commit_message: Publish backend from ${{ github.sha }}
