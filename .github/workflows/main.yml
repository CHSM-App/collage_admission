name: Publish dist on tag

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

env:
  DEPLOY_BRANCH: dist

jobs:
  build-and-publish:
    name: Build and publish dist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Push dist to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: ${{ env.DEPLOY_BRANCH }}
          publish_dir: ./dist
          force_orphan: true
          commit_message: Build dist from tag ${{ github.ref_name }}
